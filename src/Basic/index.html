<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrownStar Ultimate Basic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.2s ease; }
        :root { --bg: #0a0c1a; --surface: #1e293b; --primary: #3b82f6; --accent: #ffcc4d; --text: #eef4ff; --border: #2d3a5a; --error: #ef4444; --success: #10b981; }
        body.light { --bg: #f8fafc; --surface: #ffffff; --primary: #2563eb; --accent: #eab308; --text: #0f172a; --border: #e2e8f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; height: 100vh; display: flex; overflow: hidden; }
        /* Sidebar */
        .sidebar { width: 320px; background: var(--surface); display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow-y: auto; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.6rem; font-weight: bold; background: linear-gradient(135deg, var(--accent), var(--primary)); -webkit-background-clip: text; color: transparent; }
        .convo-list { flex: 1; padding: 12px; }
        .convo-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; margin-bottom: 8px; cursor: pointer; border-left: 3px solid transparent; }
        .convo-item.active { border-left-color: var(--accent); background: rgba(59,130,246,0.2); }
        .convo-title { font-weight: bold; }
        .convo-date { font-size: 0.7rem; opacity: 0.7; }
        .new-convo, .export-btn, .settings-btn { margin: 8px 12px; background: linear-gradient(135deg, var(--primary), #8b5cf6); border: none; padding: 8px; border-radius: 40px; color: white; cursor: pointer; }
        /* Chat main */
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .top-bar { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 20px; max-width: 85%; clear: both; animation: fadeIn 0.3s; }
        .user { float: right; background: var(--primary); border-radius: 20px 20px 4px 20px; padding: 12px 18px; }
        .assistant { float: left; background: var(--surface); border-radius: 20px 20px 20px 4px; padding: 12px 18px; border-left: 3px solid var(--accent); }
        .message pre { background: #1e1e2e; padding: 10px; border-radius: 8px; overflow-x: auto; }
        .message code { font-family: monospace; }
        .input-area { padding: 16px 20px; background: var(--surface); display: flex; gap: 12px; border-top: 1px solid var(--border); }
        input, textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 12px 20px; border-radius: 40px; color: var(--text); font-family: inherit; resize: vertical; }
        button { background: linear-gradient(135deg, var(--primary), #8b5cf6); border: none; padding: 0 28px; border-radius: 40px; cursor: pointer; color: white; font-weight: bold; }
        .file-label { background: var(--bg); padding: 6px 12px; border-radius: 40px; cursor: pointer; }
        /* Addon panel */
        .addon-panel { width: 400px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
        .addon-header { padding: 16px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .addon-grid { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .category { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .cat-title { background: rgba(0,0,0,0.2); padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between; }
        .cat-links { padding: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-links a { background: var(--bg); padding: 4px 10px; border-radius: 20px; text-decoration: none; color: var(--accent); font-size: 0.8rem; }
        /* Settings modal */
        .modal { position: fixed; top: 10%; left: 25%; width: 50%; background: var(--surface); border-radius: 20px; padding: 20px; z-index: 1000; display: none; flex-direction: column; gap: 12px; border: 1px solid var(--accent); }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
        .close { float: right; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header"><div class="logo">👑 CrownStar Ultimate Basic</div><button id="settingsBtn">⚙️</button></div>
    <div class="convo-list" id="convoList"></div>
    <button class="new-convo" id="newConvoBtn">+ New Conversation</button>
    <button class="export-btn" id="exportBtn">💾 Export All</button>
    <div class="search-area" style="padding:12px"><input type="text" id="searchInput" placeholder="🔍 Search messages..."></div>
</div>
<div class="chat-main">
    <div class="top-bar">
        <span>🧠 Cognitive Core v6.0</span>
        <span id="status">Ready</span>
        <label>Min Response: <input type="number" id="minLenSlider" min="100" max="5000" step="50" value="300" style="width:90px;"></label>
        <label>Temperature: <input type="range" id="tempSlider" min="0" max="1.5" step="0.05" value="0.8" style="width:100px;"></label>
        <button id="themeToggle">🌓 Theme</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <textarea id="queryInput" rows="1" placeholder="Ask anything... (Shift+Enter for new line)"></textarea>
        <button id="sendBtn">Send</button>
        <label class="file-label">📎 File<input type="file" id="fileInput" style="display:none"></label>
        <button id="voiceBtn">🎤</button>
    </div>
</div>
<div class="addon-panel" id="addonPanel">
    <div class="addon-header">📦 Addon Farm (45 categories)<button id="refreshAddons">🔄</button></div>
    <div class="addon-grid" id="addonGrid"></div>
</div>
<div class="overlay" id="modalOverlay"></div>
<div class="modal" id="settingsModal">
    <span class="close" id="closeModal">✖</span>
    <h3>Settings</h3>
    <label>Primary Color: <input type="color" id="colorPicker"></label>
    <label>Background Color: <input type="color" id="bgPicker"></label>
    <label>Font Family: <select id="fontSelect"><option>Inter</option><option>Arial</option><option>Courier New</option></select></label>
    <label>Font Size: <input type="range" id="fontSizeSlider" min="12" max="24" value="16"></label>
    <button id="applyTheme">Apply</button>
    <button id="resetTheme">Reset</button>
</div>
<script>
let db, currentConvoId, conversations = [], messages = [], limits = {maxInput: 2000000, maxOutput: 500000000};
let recognition = null;
if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
}

function openDB() {
    let req = indexedDB.open("CrownStarUltimate", 4);
    req.onupgradeneeded = (e) => {
        db = e.target.result;
        if(!db.objectStoreNames.contains("conv")) db.createObjectStore("conv", {keyPath:"id"});
        if(!db.objectStoreNames.contains("msg")) db.createObjectStore("msg", {keyPath:"id", autoIncrement:true});
    };
    req.onsuccess = (e) => { db = e.target.result; loadConversations(); };
}
async function loadConversations() {
    let convs = await window.pywebview.api.get_conversations();
    conversations = convs;
    if(conversations.length===0){
        let id = await window.pywebview.api.new_conversation("New Chat");
        conversations = [{id:id, title:"New Chat", created:new Date().toISOString()}];
    }
    currentConvoId = conversations[0].id;
    renderConversations();
    loadMessages(currentConvoId);
}
function renderConversations(){
    let list = document.getElementById("convoList");
    list.innerHTML = "";
    conversations.forEach(conv => {
        let div = document.createElement("div");
        div.className = `convo-item ${currentConvoId===conv.id ? 'active' : ''}`;
        div.innerHTML = `<div class="convo-title">${escapeHtml(conv.title)}</div><div class="convo-date">${new Date(conv.created).toLocaleString()}</div>`;
        div.onclick = () => { currentConvoId = conv.id; loadMessages(conv.id); renderConversations(); };
        list.appendChild(div);
    });
}
async function loadMessages(convId){
    let msgs = await window.pywebview.api.get_messages(convId);
    messages = msgs;
    renderMessages();
}
function renderMessages(){
    let container = document.getElementById("messages");
    container.innerHTML = "";
    messages.forEach(msg => {
        let div = document.createElement("div");
        div.className = `message ${msg.role}`;
        let content = msg.role === "assistant" ? marked.parse(msg.content) : escapeHtml(msg.content);
        div.innerHTML = `<strong>${msg.role==="user"?"You":"CrownStar"}:</strong><br>${content}`;
        container.appendChild(div);
        if(msg.role === "assistant") hljs.highlightAll();
    });
    container.scrollTop = container.scrollHeight;
}
function addMessage(role, content, convId=currentConvoId){
    window.pywebview.api.store_message(convId, role, content);
    if(convId === currentConvoId) loadMessages(currentConvoId);
}
async function send(){
    let input = document.getElementById("queryInput");
    let text = input.value.trim();
    if(!text) return;
    if(text.length > limits.maxInput){ addMessage("assistant", `❌ Input exceeds ${limits.maxInput} characters.`); return; }
    input.value = "";
    addMessage("user", text);
    let minLen = document.getElementById("minLenSlider").value;
    let temp = document.getElementById("tempSlider").value;
    await window.pywebview.api.set_setting("temperature", temp);
    document.getElementById("status").innerText = "Thinking...";
    try {
        let ans = await window.pywebview.api.chat(text, currentConvoId, minLen);
        if(ans.length > limits.maxOutput) ans = ans.slice(0, limits.maxOutput);
        addMessage("assistant", ans);
    } catch(e) { addMessage("assistant", "Error: "+e.message); }
    document.getElementById("status").innerText = "Ready";
}
async function searchMessages(){
    let query = document.getElementById("searchInput").value;
    if(!query) return;
    let results = await window.pywebview.api.search_messages(query);
    let container = document.getElementById("messages");
    container.innerHTML = "<h3>Search Results:</h3>";
    for(let r of results){
        let div = document.createElement("div");
        div.className = "message assistant";
        div.innerHTML = `<strong>Found:</strong><br>${escapeHtml(r.content)}`;
        container.appendChild(div);
    }
}
async function loadAddons(){
    let data = await window.pywebview.api.get_addons();
    let categories = Object.keys(data);
    let allowed = categories.slice(0, 45);
    let grid = document.getElementById("addonGrid");
    grid.innerHTML = "";
    for(let cat of allowed){
        let catDiv = document.createElement("div");
        catDiv.className = "category";
        let title = document.createElement("div");
        title.className = "cat-title";
        title.innerHTML = `${data[cat].icon || "📦"} ${cat} <span>▼</span>`;
        let body = document.createElement("div");
        body.className = "cat-links";
        for(let link of data[cat].links){
            let a = document.createElement("a");
            a.href = link;
            a.target = "_blank";
            a.innerText = link.split("/").pop();
            body.appendChild(a);
        }
        catDiv.appendChild(title); catDiv.appendChild(body);
        grid.appendChild(catDiv);
        title.onclick = () => body.style.display = body.style.display==="none" ? "flex" : "none";
    }
}
function applyTheme(){
    let color = document.getElementById("colorPicker").value;
    let bgColor = document.getElementById("bgPicker").value;
    let font = document.getElementById("fontSelect").value;
    let fontSize = document.getElementById("fontSizeSlider").value;
    document.documentElement.style.setProperty('--primary', color);
    document.documentElement.style.setProperty('--bg', bgColor);
    document.body.style.fontFamily = font;
    document.body.style.fontSize = fontSize + "px";
    window.pywebview.api.set_setting("theme_color", color);
    window.pywebview.api.set_setting("bg_color", bgColor);
    window.pywebview.api.set_setting("font_family", font);
    window.pywebview.api.set_setting("font_size", fontSize);
}
async function loadTheme(){
    let color = await window.pywebview.api.get_setting("theme_color") || "#3b82f6";
    let bg = await window.pywebview.api.get_setting("bg_color") || "#0a0c1a";
    let font = await window.pywebview.api.get_setting("font_family") || "Inter";
    let size = await window.pywebview.api.get_setting("font_size") || "16";
    document.getElementById("colorPicker").value = color;
    document.getElementById("bgPicker").value = bg;
    document.getElementById("fontSelect").value = font;
    document.getElementById("fontSizeSlider").value = size;
    applyTheme();
}
document.getElementById("sendBtn").onclick = send;
document.getElementById("queryInput").onkeypress = (e) => { if(e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(); } };
document.getElementById("newConvoBtn").onclick = async () => {
    let id = await window.pywebview.api.new_conversation("New Chat");
    conversations.push({id:id, title:"New Chat", created:new Date().toISOString()});
    currentConvoId = id;
    renderConversations();
    loadMessages(currentConvoId);
};
document.getElementById("exportBtn").onclick = async () => { alert(await window.pywebview.api.export_conversations()); };
document.getElementById("refreshAddons").onclick = loadAddons;
document.getElementById("settingsBtn").onclick = () => { document.getElementById("settingsModal").style.display="flex"; document.getElementById("modalOverlay").style.display="block"; };
document.getElementById("closeModal").onclick = () => { document.getElementById("settingsModal").style.display="none"; document.getElementById("modalOverlay").style.display="none"; };
document.getElementById("applyTheme").onclick = applyTheme;
document.getElementById("resetTheme").onclick = () => { document.getElementById("colorPicker").value="#3b82f6"; document.getElementById("bgPicker").value="#0a0c1a"; document.getElementById("fontSelect").value="Inter"; document.getElementById("fontSizeSlider").value="16"; applyTheme(); };
document.getElementById("minLenSlider").onchange = async () => { await window.pywebview.api.set_setting("min_response_len", document.getElementById("minLenSlider").value); };
document.getElementById("tempSlider").onchange = async () => { await window.pywebview.api.set_setting("temperature", document.getElementById("tempSlider").value); };
document.getElementById("fileInput").onchange = async (e) => {
    let file = e.target.files[0];
    if(!file) return;
    if(file.size > 1073741824){ alert("File too large"); return; }
    let reader = new FileReader();
    reader.onload = async (ev) => {
        let content = ev.target.result.slice(0,20000);
        await window.pywebview.api.store_file(currentConvoId, file.name, content);
        addMessage("assistant", `📎 File uploaded: ${file.name} (${content.length} chars preview)`);
    };
    reader.readAsText(file);
};
if(recognition){
    document.getElementById("voiceBtn").onclick = () => {
        recognition.start();
        recognition.onresult = (event) => {
            let transcript = event.results[0][0].transcript;
            document.getElementById("queryInput").value = transcript;
            send();
        };
    };
} else {
    document.getElementById("voiceBtn").style.display = "none";
}
document.getElementById("searchInput").oninput = () => { if(document.getElementById("searchInput").value.length > 2) searchMessages(); };
document.getElementById("themeToggle").onclick = () => document.body.classList.toggle("light");
openDB();
loadAddons();
loadTheme();
</script>
</body>
</html>
