<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>CrownStar Pro</title>
<style>
  :root { --bg: #0a0c1a; --surface: #1e293b; --primary: #3b82f6; --accent: #ffcc4d; --text: #eef4ff; --border: #2d3a5a; }
  * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.2s ease; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; overflow: hidden; }
  /* Sidebar */
  .sidebar { width: 320px; background: var(--surface); display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .logo { font-size: 1.6rem; font-weight: bold; background: linear-gradient(135deg, var(--accent), var(--primary)); -webkit-background-clip: text; color: transparent; }
  .convo-list { flex: 1; overflow-y: auto; padding: 12px; }
  .convo-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; margin-bottom: 8px; cursor: pointer; border-left: 3px solid transparent; }
  .convo-item.active { border-left-color: var(--accent); background: rgba(59,130,246,0.2); }
  .new-convo, .export-btn, .settings-btn { margin: 8px 12px; background: linear-gradient(135deg, var(--primary), #8b5cf6); border: none; padding: 8px; border-radius: 40px; color: white; cursor: pointer; }
  /* Main chat area */
  .chat-main { flex: 1; display: flex; flex-direction: column; }
  .top-bar { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; }
  .message { margin-bottom: 16px; max-width: 85%; clear: both; }
  .user { float: right; background: var(--primary); border-radius: 20px 20px 4px 20px; padding: 10px 16px; }
  .assistant { float: left; background: var(--surface); border-radius: 20px 20px 20px 4px; padding: 10px 16px; border-left: 3px solid var(--accent); }
  .input-area { padding: 16px 20px; background: var(--surface); display: flex; gap: 12px; border-top: 1px solid var(--border); }
  input { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 12px 20px; border-radius: 40px; color: var(--text); }
  button { background: linear-gradient(135deg, var(--primary), #8b5cf6); border: none; padding: 0 28px; border-radius: 40px; cursor: pointer; color: white; }
  .file-label { background: var(--bg); padding: 6px 12px; border-radius: 40px; cursor: pointer; }
  /* Addon panel */
  .addon-panel { width: 400px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .addon-header { padding: 16px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .addon-grid { display: flex; flex-direction: column; gap: 16px; padding: 16px; }
  .category { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .cat-title { background: rgba(0,0,0,0.3); padding: 8px 12px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
  .cat-links { padding: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
  .cat-links a { background: var(--bg); padding: 4px 10px; border-radius: 20px; text-decoration: none; color: var(--accent); font-size: 0.8rem; display: inline-block; }
  .cat-links a:hover { background: var(--primary); color: white; }
  .add-link { margin-top: 8px; display: flex; gap: 6px; }
  .add-link input { flex: 1; padding: 4px; font-size: 0.8rem; }
  /* Theme controls */
  .settings-modal { position: fixed; top: 20%; left: 30%; width: 40%; background: var(--surface); border-radius: 20px; padding: 20px; z-index: 1000; display: none; flex-direction: column; gap: 12px; border: 1px solid var(--accent); }
  .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
  .close { float: right; cursor: pointer; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header"><div class="logo">👑 CrownStar Pro</div><button id="settingsBtn">⚙️</button></div>
  <div class="convo-list" id="convoList"></div>
  <button class="new-convo" id="newConvoBtn">+ New Conversation</button>
  <button class="export-btn" id="exportBtn">📎 Export Data</button>
</div>
<div class="chat-main">
  <div class="top-bar"><span>🧠 Cognitive Core</span><span id="status">Ready</span><span>Min Response: <input type="number" id="minLenSlider" min="50" max="2000" step="10" value="200" style="width:80px;"></span></div>
  <div class="messages" id="messages"></div>
  <div class="input-area"><input id="queryInput" placeholder="Ask anything..."><button id="sendBtn">Send</button><label class="file-label">📁 File<input type="file" id="fileInput" style="display:none"></label></div>
</div>
<div class="addon-panel" id="addonPanel">
  <div class="addon-header">📦 Addon Farm <span>(Pro – 45 categories)</span><button id="refreshAddons">🔄</button></div>
  <div class="addon-grid" id="addonGrid"></div>
</div>
<div class="modal-overlay" id="modalOverlay"></div>
<div class="settings-modal" id="settingsModal">
  <span class="close" id="closeModal">✖</span>
  <h3>Theme & Usability</h3>
  <label>Primary Color: <input type="color" id="colorPicker"></label>
  <label>Background Color: <input type="color" id="bgPicker"></label>
  <label>Font Family: <select id="fontSelect"><option>Segoe UI</option><option>Arial</option><option>Courier New</option></select></label>
  <label>Background Image URL: <input type="text" id="bgImageUrl" placeholder="https://..."></label>
  <button id="applyTheme">Apply</button>
  <button id="resetTheme">Reset</button>
</div>
<script>
let db, currentConvoId, conversations = [], messages = [], limits = {maxInput: 2000000, maxOutput: 500000000};
let allowedAddons = 45;

// IndexedDB
function openDB() {
    let req = indexedDB.open("CrownStar", 3);
    req.onupgradeneeded = (e) => {
        db = e.target.result;
        if(!db.objectStoreNames.contains("conv")) db.createObjectStore("conv", {keyPath:"id"});
        if(!db.objectStoreNames.contains("msg")) db.createObjectStore("msg", {keyPath:"id", autoIncrement:true});
    };
    req.onsuccess = (e) => { db = e.target.result; loadConversations(); };
}
function loadConversations() {
    let tx = db.transaction("conv","readonly");
    tx.objectStore("conv").getAll().onsuccess = (e) => {
        conversations = e.target.result;
        if(conversations.length===0){
            let id = Date.now().toString();
            conversations = [{id:id, title:"New Chat"}];
            let tx2 = db.transaction("conv","readwrite");
            tx2.objectStore("conv").add(conversations[0]);
        }
        currentConvoId = conversations[0].id;
        renderConversations();
        loadMessages(currentConvoId);
        loadFiles(currentConvoId);
    };
}
function renderConversations(){
    let list = document.getElementById("convoList");
    list.innerHTML = "";
    conversations.forEach(conv => {
        let div = document.createElement("div");
        div.className = `convo-item ${currentConvoId===conv.id ? 'active' : ''}`;
        div.innerText = conv.title;
        div.onclick = () => { currentConvoId = conv.id; loadMessages(conv.id); renderConversations(); };
        list.appendChild(div);
    });
}
function loadMessages(convId){
    let tx = db.transaction("msg","readonly");
    tx.objectStore("msg").getAll().onsuccess = (e) => {
        messages = e.target.result.filter(m => m.convId === convId).sort((a,b)=>a.id-b.id);
        renderMessages();
    };
}
function renderMessages(){
    let container = document.getElementById("messages");
    container.innerHTML = "";
    messages.forEach(msg => {
        let div = document.createElement("div");
        div.className = `message ${msg.role}`;
        div.innerHTML = `<strong>${msg.role==="user"?"You":"CrownStar"}:</strong><br>${escapeHtml(msg.content)}`;
        container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
}
function addMessage(role, content, convId=currentConvoId){
    let newMsg = {id:Date.now(), convId:convId, role:role, content:content};
    messages.push(newMsg);
    let tx = db.transaction("msg","readwrite");
    tx.objectStore("msg").add(newMsg);
    renderMessages();
}
async function send(){
    let input = document.getElementById("queryInput");
    let text = input.value.trim();
    if(!text) return;
    if(text.length > limits.maxInput){ addMessage("assistant", `❌ Input exceeds ${limits.maxInput} characters.`); return; }
    input.value = "";
    addMessage("user", text);
    let minLen = document.getElementById("minLenSlider").value;
    document.getElementById("status").innerText = "Thinking...";
    try {
        let ans = await window.pywebview.api.chat(text, currentConvoId, minLen);
        if(ans.length > limits.maxOutput) ans = ans.slice(0, limits.maxOutput);
        addMessage("assistant", ans);
    } catch(e) { addMessage("assistant", "Error: "+e.message); }
    document.getElementById("status").innerText = "Ready";
}
// Addon farm
async function loadAddons(){
    let data = await window.pywebview.api.get_addons();
    let categories = Object.keys(data);
    let allowed = categories.slice(0, allowedAddons);
    let grid = document.getElementById("addonGrid");
    grid.innerHTML = "";
    for(let cat of allowed){
        let catDiv = document.createElement("div");
        catDiv.className = "category";
        let title = document.createElement("div");
        title.className = "cat-title";
        title.innerHTML = `${data[cat].icon || "📦"} ${cat} <span>▼</span>`;
        let body = document.createElement("div");
        body.className = "cat-links";
        for(let link of data[cat].links){
            let a = document.createElement("a");
            a.href = link;
            a.target = "_blank";
            a.innerText = link.split("/").pop();
            body.appendChild(a);
            let del = document.createElement("button");
            del.innerText = "❌";
            del.style.background = "transparent";
            del.onclick = async (e) => { e.stopPropagation(); await window.pywebview.api.delete_addon(cat, link); loadAddons(); };
            body.appendChild(del);
            body.appendChild(document.createTextNode(" "));
        }
        let addDiv = document.createElement("div");
        addDiv.className = "add-link";
        let inp = document.createElement("input");
        inp.placeholder = "New GitHub URL";
        let btn = document.createElement("button");
        btn.innerText = "+";
        btn.onclick = async () => { if(inp.value) { await window.pywebview.api.save_addon(cat, inp.value); loadAddons(); inp.value=""; } };
        addDiv.appendChild(inp); addDiv.appendChild(btn);
        body.appendChild(addDiv);
        catDiv.appendChild(title); catDiv.appendChild(body);
        grid.appendChild(catDiv);
        title.onclick = () => body.style.display = body.style.display==="none" ? "flex" : "none";
    }
}
// Theme management
function applyTheme(){
    let color = document.getElementById("colorPicker").value;
    let bgColor = document.getElementById("bgPicker").value;
    let font = document.getElementById("fontSelect").value;
    let bgImage = document.getElementById("bgImageUrl").value;
    document.documentElement.style.setProperty('--primary', color);
    document.documentElement.style.setProperty('--bg', bgColor);
    document.body.style.fontFamily = font;
    document.body.style.backgroundImage = bgImage ? `url(${bgImage})` : "none";
    window.pywebview.api.set_setting("theme_color", color);
    window.pywebview.api.set_setting("bg_color", bgColor);
    window.pywebview.api.set_setting("font_family", font);
    window.pywebview.api.set_setting("bg_image", bgImage);
}
async function loadTheme(){
    let color = await window.pywebview.api.get_setting("theme_color") || "#3b82f6";
    let bg = await window.pywebview.api.get_setting("bg_color") || "#0a0c1a";
    let font = await window.pywebview.api.get_setting("font_family") || "Segoe UI";
    let bgImg = await window.pywebview.api.get_setting("bg_image") || "";
    document.getElementById("colorPicker").value = color;
    document.getElementById("bgPicker").value = bg;
    document.getElementById("fontSelect").value = font;
    document.getElementById("bgImageUrl").value = bgImg;
    applyTheme();
}
// File upload
document.getElementById("fileInput").onchange = async (e) => {
    let file = e.target.files[0];
    if(!file) return;
    if(file.size > 2147483648){ alert("File too large for your tier"); return; }
    let reader = new FileReader();
    reader.onload = async (ev) => {
        let content = ev.target.result.slice(0,10000);
        await window.pywebview.api.store_file(currentConvoId, file.name, content);
        addMessage("assistant", `📎 File uploaded: ${file.name} (${content.length} chars preview)`);
    };
    reader.readAsText(file);
};
// Misc
document.getElementById("sendBtn").onclick = send;
document.getElementById("queryInput").onkeypress = (e) => { if(e.key==="Enter") send(); };
document.getElementById("newConvoBtn").onclick = () => {
    let newId = Date.now().toString();
    let newConv = {id:newId, title:"New Chat"};
    let tx = db.transaction("conv","readwrite");
    tx.objectStore("conv").add(newConv);
    conversations.push(newConv);
    currentConvoId = newId;
    renderConversations();
    messages = [];
    renderMessages();
};
document.getElementById("refreshAddons").onclick = loadAddons;
document.getElementById("settingsBtn").onclick = () => { document.getElementById("settingsModal").style.display="flex"; document.getElementById("modalOverlay").style.display="block"; };
document.getElementById("closeModal").onclick = () => { document.getElementById("settingsModal").style.display="none"; document.getElementById("modalOverlay").style.display="none"; };
document.getElementById("applyTheme").onclick = applyTheme;
document.getElementById("resetTheme").onclick = () => { document.getElementById("colorPicker").value="#3b82f6"; document.getElementById("bgPicker").value="#0a0c1a"; document.getElementById("fontSelect").value="Segoe UI"; document.getElementById("bgImageUrl").value=""; applyTheme(); };
document.getElementById("minLenSlider").onchange = async () => { await window.pywebview.api.set_setting("min_response_len", document.getElementById("minLenSlider").value); };
function escapeHtml(s){ return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
openDB();
loadAddons();
loadTheme();
</script>
</body>
</html>
