name: Build and Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        tier: [Free, Basic, Pro, Enterprise]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install pywebview aiohttp dnspython python-whois feedparser pyinstaller
    - name: Build EXE
      run: |
        cd src/${{ matrix.tier }}
        pyinstaller CrownStar_${{ matrix.tier }}.spec
    - name: Build Installer (InnoSetup)
      uses: Minionguyjpro/Inno-Setup-Action@v1
      with:
        path: src/${{ matrix.tier }}/CrownStar_${{ matrix.tier }}.iss
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CrownStar_${{ matrix.tier }}_installer
        path: installers/*.exe
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: installers/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
