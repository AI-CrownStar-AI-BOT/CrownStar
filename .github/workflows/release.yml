name: Build and Release
on:
  push:
    tags:
      - 'v*'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        tier: [Free, Basic, Pro, Enterprise]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install pywebview aiohttp dnspython python-whois feedparser pyinstaller
    - name: Build EXE with spec
      run: |
        cd src/${{ matrix.tier }}
        pyinstaller CrownStar_${{ matrix.tier }}.spec
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: CrownStar_${{ matrix.tier }}
        path: src/${{ matrix.tier }}/dist/CrownStar_${{ matrix.tier }}.exe
